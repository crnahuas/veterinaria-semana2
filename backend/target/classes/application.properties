spring.application.name=veterinaria-backend

# Base de datos principal MySQL
spring.datasource.url=${DB_URL:jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3308}/${DB_NAME:mydatabase}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Santiago}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:myuser}
spring.datasource.password=${DB_PASSWORD:password}

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# JWT
security.jwt.secret=${JWT_SECRET:veterinariaJwtSecret2026DuocUCProtegiendoAplicacionWebConSpringSecurityYJWT}
security.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Frontend servido desde el mismo proyecto
spring.web.resources.static-locations=classpath:/static/,file:${user.dir}/frontend/,file:${user.dir}/../frontend/

# HTTPS
server.port=${HTTPS_PORT:8384}
server.ssl.enabled=${SSL_ENABLED:true}
server.ssl.key-store=classpath:veterinaria-keystore.p12
server.ssl.key-store-type=PKCS12
server.ssl.key-store-password=${SSL_KEY_STORE_PASSWORD:changeit}
server.ssl.key-alias=${SSL_KEY_ALIAS:veterinaria-https}

# Redirección HTTP -> HTTPS
app.http.port=${HTTP_PORT:8080}

# Frontend externo
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*,https://localhost:*,https://127.0.0.1:*}
