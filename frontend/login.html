<!DOCTYPE html>
<html lang="es">
<head>
    <title>Acceso | Veterinaria</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" type="text/css" href="./css/login.css">
</head>
<body>
    <main class="login-page">
        <section class="login-card">
            <h1>Veterinaria Duoc UC</h1>
            <p>Ingrese con una cuenta válida para acceder al sistema desde esta misma aplicación.</p>

            <div id="error-msg" class="alert alert-error" style="display:none;"></div>

            <form id="login-form" class="login-form">
                <div class="field">
                    <label for="username">Usuario</label>
                    <input id="username" type="text" name="username" required />
                </div>

                <div class="field">
                    <label for="password">Contraseña</label>
                    <input id="password" type="password" name="password" required />
                </div>

                <button type="submit">Ingresar</button>
            </form>

            <div class="info">
                <p><strong>Usuarios de prueba:</strong> recepcionista / vet123, veterinario / vet123, admin / admin123.</p>
                <p><a href="/">Volver al inicio</a></p>
            </div>
        </section>
    </main>

    <script src="./js/app.js"></script>
    <script>
        setApiBaseUrl(DEFAULT_API_BASE_URL);

        document.getElementById('login-form').addEventListener('submit', async function (e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-msg');
            errorDiv.style.display = 'none';

            try {
                const response = await fetch(buildApiUrl('/api/login'), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (!response.ok) {
                    errorDiv.textContent = 'Usuario o contraseña incorrectos';
                    errorDiv.style.display = 'block';
                    return;
                }

                const data = await response.json();
                localStorage.setItem('token', data.token);
                localStorage.setItem('username', data.username);
                localStorage.setItem('role', data.role);

                if (data.role === 'VETERINARIO') {
                    window.location.href = '/citas';
                } else {
                    window.location.href = '/pacientes';
                }
            } catch (error) {
                errorDiv.textContent = 'Error de conexión con el servidor';
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
